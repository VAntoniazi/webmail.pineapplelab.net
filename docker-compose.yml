version: '2.4'

services:
  mailcow:
    image: mailcow/mailcow:latest
    restart: always
    container_name: mailcow
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "993:993"
      - "995:995"
      - "143:143"
      - "110:110"
      - "4190:4190"
      - "8082:80"
    volumes:
      - mailcow_data:/var/lib/mailcow
      - mailcow_crypto:/var/lib/mailcow/crypto
      - mailcow_ssl:/var/lib/mailcow/ssl
    environment:
      - DBNAME=mailcow
      - DBUSER=mailcow
      - DBPASS=mailcowStrongPassword123
      - REDIS_PASS=redisStrongPassword123
      - MAILCOW_HOSTNAME=mail.pineapplelab.net
      - SKIP_LETS_ENCRYPT=n
      - TZ=America/Sao_Paulo
    networks:
      - dokploy-network

volumes:
  mailcow_data:
    driver: local
  mailcow_crypto:
    driver: local
  mailcow_ssl:
    driver: local

networks:
  dokploy-network:
    external: true