# docker-compose.yml
services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    container_name: stalwart-mailserver
    ports:
      - "25:25"       # SMTP (para receber e-mails da internet)
      - "587:587"     # SMTP Submission (para clientes de e-mail enviarem mensagens)
      - "465:465"     # SMTPS (envio seguro para clientes legados)
      - "993:993"     # IMAPS (para clientes de e-mail baixarem mensagens com segurança)
      - "143:143"     # IMAP (para clientes que usam STARTTLS)
      - "4190:4190"   # ManageSieve (para gerenciar regras de filtro de e-mail)
    volumes:
      - stalwart_data:/opt/stalwart
    environment:
      - SESSION__RCPT__CATCH_ALL=true # Opcional: captura e-mails enviados para qualquer endereço no seu domínio
    networks:
      - dokploy-network

volumes:
  stalwart_data:

# A rede 'dokploy-network' é criada automaticamente pelo Dokploy. Use o nome exato.
networks:
  dokploy-network:
    external: true