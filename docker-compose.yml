version: '3.8'

services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    container_name: stalwart-mail
    ports:
      # SMTP (envio/recebimento)
      - "25:25"
      # SMTP Submission (envio autenticado para clientes)
      - "587:587"
      # SMTPS (envio seguro para clientes legados)
      - "465:465"
      # IMAP (leitura de emails - não seguro)
      - "143:143"
      # IMAPS (leitura segura de emails)
      - "993:993"
      # HTTP (interface web - IMPORTANTE para evitar Bad Gateway)
      - "8080:80"
      # HTTPS (interface web segura - será configurado depois)
      - "443:443"
      # ManageSieve (filtros de email)
      - "4190:4190"
    volumes:
      - stalwart_data:/opt/stalwart
      - stalwart_logs:/opt/stalwart/logs
    environment:
      - TZ=America/Sao_Paulo
      # Configuração para HTTP funcionar corretamente
      - STALWART_HTTP_BIND=0.0.0.0:80
      - STALWART_HTTPS_BIND=0.0.0.0:443
      # Configuração de hostname
      - STALWART_HOSTNAME=mail.pineapplelab.net
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  stalwart_data:
    driver: local
  stalwart_logs:
    driver: local

networks:
  dokploy-network:
    external: true