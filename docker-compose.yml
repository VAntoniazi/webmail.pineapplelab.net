services:
  mailcow:
    image: mailcow/mailcow-dockerized:latest
    container_name: mailcow
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "993:993"
      - "995:995"
      - "8082:80"
    volumes:
      - mailcow_data:/data
    environment:
      - MAILCOW_HOSTNAME=mail.pineapplelab.net
      - TZ=America/Sao_Paulo
    restart: always
    networks:
      - dokploy-network

volumes:
  mailcow_data:

networks:
  dokploy-network:
    external: true