services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    container_name: stalwart-mail
    ports:
      - "2525:25"
      - "2587:587"
      - "2465:465"
      - "2143:143"
      - "2993:993"
      - "2110:110"
      - "2995:995"
      - "8082:80"
      - "8443:443"
      - "4190:4190"
    volumes:
      - stalwart_data:/opt/stalwart
      - stalwart_logs:/opt/stalwart/logs
    environment:
      - TZ=America/Sao_Paulo
      - STALWART_HTTP_BIND=0.0.0.0:80
      - STALWART_HTTPS_BIND=0.0.0.0:443
      - STALWART_HOSTNAME=mail.pineapplelab.net
      - STALWART_URL=https://mail.pineapplelab.net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stalwart.rule=Host(`mail.pineapplelab.net`)"
      - "traefik.http.services.stalwart.loadbalancer.server.port=80"
    networks:
      - dokploy-network

volumes:
  stalwart_data:
  stalwart_logs:

networks:
  dokploy-network:
    external: true