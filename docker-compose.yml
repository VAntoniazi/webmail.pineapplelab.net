services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    container_name: stalwart-mail
    ports:
      # SMTP (envio/recebimento)
      - "25:25"
      # SMTP Submission (envio autenticado)
      - "587:587"
      # SMTPS (envio seguro)
      - "465:465"
      # IMAP (leitura)
      - "143:143"
      # IMAPS (leitura segura)
      - "993:993"
      # HTTP Webmail - usando porta 8080 para não conflitar
      - "8080:80"
      # HTTPS - será gerenciado pelo Dokploy/Traefik
      - "8443:443"
      # ManageSieve
      - "4190:4190"
    volumes:
      - stalwart_data:/opt/stalwart
      - stalwart_logs:/opt/stalwart/logs
    environment:
      - TZ=America/Sao_Paulo
      - STALWART_HTTP_BIND=0.0.0.0:80
      - STALWART_HTTPS_BIND=0.0.0.0:443
      - STALWART_HOSTNAME=mail.pineapplelab.net
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  stalwart_data:
    driver: local
  stalwart_logs:
    driver: local

networks:
  dokploy-network:
    external: true